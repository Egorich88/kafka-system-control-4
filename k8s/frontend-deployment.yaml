apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kafka-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: your-registry/kafka-control-frontend:latest   # замени на свой registry
          ports:
            - containerPort: 80