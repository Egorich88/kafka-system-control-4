apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kafka-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/kafka-control-backend:latest   # замени на свой registry
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: bootstrap.servers
            - name: KAFKA_HOME
              value: "/opt/kafka"
          volumeMounts:
            - name: kafka-bin
              mountPath: /opt/kafka
      volumes:
        - name: kafka-bin
          hostPath:
            path: /opt/kafka   # путь к бинарникам Kafka на ноде (может отличаться)